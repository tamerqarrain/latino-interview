<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لاتينو — المقابلة المبدئية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b0f;
    --surface: #0d1520;
    --border: #1a2840;
    --gold: #c9a84c;
    --gold-dim: #6b5520;
    --gold-glow: rgba(201,168,76,0.12);
    --text: #ddd8cc;
    --text-dim: #5a6b80;
    --green: #27ae60;
    --red: #e74c3c;
    --blue: #3a85d8;
    --purple: #8e44ad;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    direction: rtl;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: opacity .4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ══ SETUP ══ */
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 52px;
    width: 480px;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 80px rgba(201,168,76,0.06);
  }
  .setup-card::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .brand { text-align: center; margin-bottom: 36px; }
  .brand-orb {
    width: 80px; height: 80px; border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    background: radial-gradient(circle at 35% 30%, #1a2535, var(--bg));
    box-shadow: 0 0 40px rgba(201,168,76,0.18), inset 0 0 20px rgba(201,168,76,0.06);
    position: relative;
  }
  .brand-orb::after {
    content: '';
    position: absolute; inset: -5px; border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.18);
  }
  .brand-orb span { font-family: 'DM Mono'; font-size: 32px; font-weight: 700; color: var(--gold); }
  .brand h1 { font-size: 30px; font-weight: 900; color: var(--text); }
  .brand p { font-size: 13px; color: var(--text-dim); margin-top: 5px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 7px; }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 14px;
    outline: none; transition: border .2s;
    appearance: none; -webkit-appearance: none; text-align: right;
  }
  .field input::placeholder { color: var(--text-dim); }
  .field input:focus, .field select:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }
  .field select option { background: #111c2e; }

  .btn-begin {
    width: 100%; margin-top: 10px; padding: 15px; border-radius: 10px;
    border: 1px solid var(--gold); background: transparent; color: var(--gold);
    font-family: 'Tajawal', sans-serif; font-size: 20px; font-weight: 700;
    cursor: pointer; transition: all .3s; position: relative; overflow: hidden;
  }
  .btn-begin::before {
    content: ''; position: absolute; inset: 0;
    background: var(--gold-glow); transform: scaleX(0); transform-origin: right;
    transition: transform .35s;
  }
  .btn-begin:hover::before { transform: scaleX(1); }
  .btn-begin:hover { box-shadow: 0 0 40px rgba(201,168,76,0.18); }
  .btn-begin span { position: relative; z-index: 1; }
  .btn-begin:disabled { opacity: .4; cursor: default; }
  .setup-error { font-size: 13px; color: var(--red); text-align: center; margin-top: 10px; min-height: 18px; }

  /* ══ INTERVIEW ROOM ══ */
  #roomScreen { flex-direction: column; }

  .room-top {
    position: fixed; top: 0; left: 0; right: 0; padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(to bottom, rgba(7,11,15,1), transparent); z-index: 20;
  }
  .room-brand { font-family: 'DM Mono'; font-size: 17px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
  .room-counter { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .room-info { text-align: left; }
  .room-name { font-size: 14px; color: var(--text); font-weight: 600; }
  .room-role { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ── Orb ── */
  .orb-wrap {
    position: relative; width: 280px; height: 280px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 56px; z-index: 5;
  }

  .ring { position: absolute; border-radius: 50%; border: 1px solid transparent; animation: spin linear infinite; }
  .ring-1 { inset: 0; border-color: rgba(201,168,76,.35) transparent rgba(201,168,76,.1) transparent; animation-duration: 9s; }
  .ring-2 { inset: 18px; border-color: transparent rgba(201,168,76,.2) transparent rgba(201,168,76,.28); animation-duration: 15s; animation-direction: reverse; }
  .ring-3 { inset: 32px; border-color: rgba(201,168,76,.12) transparent rgba(201,168,76,.22) transparent; animation-duration: 22s; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .orb-core {
    position: relative; z-index: 3;
    width: 148px; height: 148px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #1c2840, #070b0f);
    border: 1px solid rgba(201,168,76,.28);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 60px rgba(201,168,76,.08), inset 0 0 30px rgba(201,168,76,.04);
    transition: box-shadow .5s, border-color .5s;
  }
  .orb-core.speaking  { box-shadow: 0 0 100px rgba(201,168,76,.4),  inset 0 0 40px rgba(201,168,76,.12);  border-color: rgba(201,168,76,.7); }
  .orb-core.reading   { box-shadow: 0 0 100px rgba(142,68,173,.4),  inset 0 0 40px rgba(142,68,173,.12); border-color: rgba(142,68,173,.7); }
  .orb-core.listening { box-shadow: 0 0 100px rgba(39,174,96,.35),  inset 0 0 40px rgba(39,174,96,.1);   border-color: rgba(39,174,96,.6); }
  .orb-core.thinking  { box-shadow: 0 0 80px  rgba(58,133,216,.3),  inset 0 0 30px rgba(58,133,216,.08); border-color: rgba(58,133,216,.5); }

  .orb-L { font-family: 'DM Mono'; font-size: 58px; font-weight: 700; color: var(--gold); line-height: 1; }

  /* Soundwave (speaking / reading) */
  .soundwave {
    position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 3px; align-items: center; height: 30px;
    opacity: 0; transition: opacity .3s;
  }
  .soundwave.on { opacity: 1; }
  .bar { width: 3px; border-radius: 99px; background: var(--gold); animation: bar-dance .7s ease-in-out infinite; }
  .bar:nth-child(1){height:5px;animation-delay:0s}   .bar:nth-child(2){height:10px;animation-delay:.08s}
  .bar:nth-child(3){height:18px;animation-delay:.16s} .bar:nth-child(4){height:24px;animation-delay:.24s}
  .bar:nth-child(5){height:28px;animation-delay:.30s} .bar:nth-child(6){height:24px;animation-delay:.24s}
  .bar:nth-child(7){height:18px;animation-delay:.16s} .bar:nth-child(8){height:10px;animation-delay:.08s}
  .bar:nth-child(9){height:5px;animation-delay:0s}
  @keyframes bar-dance { 0%,100%{transform:scaleY(.3)} 50%{transform:scaleY(1)} }

  /* Countdown ring (shown during 1-minute reading window) */
  .countdown-wrap {
    position: absolute; bottom: -72px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; transition: opacity .4s; pointer-events: none;
  }
  .countdown-wrap.on { opacity: 1; }
  .cd-svg-wrap { position: relative; width: 60px; height: 60px; }
  .cd-svg { transform: rotate(-90deg); }
  .cd-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
  .cd-bar   { fill: none; stroke: var(--purple); stroke-width: 3.5; stroke-linecap: round;
              stroke-dasharray: 163.4; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
  .cd-num {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 15px; font-weight: 700; color: var(--purple);
    font-family: 'DM Mono';
  }
  .cd-label {
    font-size: 10px; color: var(--text-dim); margin-top: 4px;
    letter-spacing: 1px; text-align: center; white-space: nowrap;
  }

  /* Mic visualizer (shown during unlimited recording) */
  .mic-indicator {
    position: absolute; bottom: -66px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    opacity: 0; transition: opacity .3s; white-space: nowrap;
  }
  .mic-indicator.on { opacity: 1; }
  #micCanvas { display: block; }
  .mic-label { font-size: 11px; color: var(--green); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
  .mic-dot-live {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    animation: live-blink 1s ease-in-out infinite;
  }
  @keyframes live-blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Status ── */
  .status-wrap { text-align: center; max-width: 600px; padding: 0 24px; z-index: 5; }

  .status-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 14px;
  }
  .status-pip { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); }
  .status-pip.gold   { background: var(--gold);   animation: pip-glow 1.6s ease-in-out infinite; }
  .status-pip.green  { background: var(--green);  animation: pip-glow 1.2s ease-in-out infinite; }
  .status-pip.blue   { background: var(--blue);   animation: pip-glow 2s   ease-in-out infinite; }
  .status-pip.purple { background: var(--purple); animation: pip-glow 1.4s ease-in-out infinite; }
  @keyframes pip-glow { 0%,100%{opacity:.3} 50%{opacity:1} }

  .status-msg { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.6; min-height: 65px; }

  /* Question text box — shown during reading phase */
  .question-box {
    margin-top: 16px; padding: 16px 22px;
    background: rgba(142,68,173,0.08);
    border: 1px solid rgba(142,68,173,0.3);
    border-radius: 10px;
    font-size: 17px; line-height: 1.7; color: var(--text);
    max-width: 560px; text-align: center;
    opacity: 0; transition: opacity .5s; min-height: 0; max-height: 0; overflow: hidden;
  }
  .question-box.on { opacity: 1; max-height: 300px; }

  .live-transcript {
    margin-top: 13px; font-size: 13px; color: var(--text-dim);
    font-style: italic; min-height: 16px;
    max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6;
  }

  .progress-dots { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
  .pdot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid var(--border); background: transparent; transition: all .3s; }
  .pdot.done   { background: var(--gold-dim); border-color: var(--gold-dim); }
  .pdot.active { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,.5); }

  /* ── Bottom bar ── */
  .room-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 20px 32px 28px;
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    background: linear-gradient(to top, rgba(7,11,15,1), transparent); z-index: 20;
  }

  .ctrl {
    padding: 10px 24px; border-radius: 99px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-family: 'Tajawal', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .ctrl:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); }
  .ctrl.primary { border-color: rgba(39,174,96,.5); color: var(--green); }
  .ctrl.primary:hover:not(:disabled) { background: rgba(39,174,96,0.08); border-color: var(--green); }
  .ctrl.answer-now { border-color: var(--purple); color: #b06fd0; background: rgba(142,68,173,0.08); font-weight: 700; }
  .ctrl.answer-now:hover { background: rgba(142,68,173,0.18); border-color: #b06fd0; }
  .ctrl.danger  { border-color: rgba(231,76,60,.35); color: var(--red); }
  .ctrl.danger:hover:not(:disabled) { background: rgba(231,76,60,.08); }
  .ctrl:disabled { opacity: .3; cursor: default; }

  /* ══ THANK YOU ══ */
  .thank-card {
    text-align: center; max-width: 520px; padding: 0 32px;
  }
  .thank-orb {
    width: 96px; height: 96px; border-radius: 50%;
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    background: radial-gradient(circle at 35% 30%, rgba(39,174,96,0.15), var(--bg));
    box-shadow: 0 0 50px rgba(39,174,96,0.25), inset 0 0 25px rgba(39,174,96,0.08);
  }
  .thank-orb span { font-size: 44px; color: var(--green); line-height: 1; }
  .thank-card h1 { font-size: 36px; font-weight: 900; color: var(--text); margin-bottom: 18px; }
  .thank-card p { font-size: 18px; line-height: 1.8; color: var(--text-dim); }
  .thank-status {
    margin-top: 32px; display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text-dim);
    padding: 10px 18px; border: 1px solid var(--border); border-radius: 99px;
  }
  .thank-spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  .thank-status.done { border-color: rgba(39,174,96,0.4); color: var(--green); }
  .thank-status.done .thank-spinner { display: none; }
  @media (max-width: 600px) {
    .thank-card h1 { font-size: 28px; }
    .thank-card p { font-size: 16px; }
    .thank-orb { width: 80px; height: 80px; }
    .thank-orb span { font-size: 36px; }
  }

  /* ══ REPORT ══ */
  #reportScreen { overflow-y: auto; align-items: flex-start; padding: 60px 24px 80px; }
  .report-inner { max-width: 760px; width: 100%; margin: 0 auto; }

  .rpt-head { text-align: center; margin-bottom: 44px; }
  .rpt-head h1 { font-size: 36px; font-weight: 900; color: var(--text); }
  .rpt-line { width: 100px; height: 1px; margin: 14px auto; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .rpt-date { font-size: 13px; color: var(--text-dim); }

  .rpt-hero-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 32px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
  }
  .rpt-cname { font-size: 28px; font-weight: 900; color: var(--gold); }
  .rpt-cmeta { font-size: 13px; color: var(--text-dim); margin-top: 5px; }

  .grade-ring { width: 78px; height: 78px; border-radius: 50%; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .grade-ring .gl { font-size: 30px; font-weight: 900; }
  .grade-ring .gs { font-size: 11px; }
  .grade-A { border-color: var(--green); color: var(--green); }
  .grade-B { border-color: var(--blue);  color: var(--blue);  }
  .grade-C { border-color: #e67e22;      color: #e67e22;      }
  .grade-D { border-color: var(--red);   color: var(--red);   }

  .rpt-section { margin-bottom: 24px; }
  .rpt-section-head { font-size: 12px; font-weight: 700; color: var(--gold); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }

  .summary-block { font-size: 17px; line-height: 1.8; color: var(--text); padding: 18px 22px; border-right: 2px solid var(--gold); background: rgba(201,168,76,0.04); border-radius: 8px 0 0 8px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:520px){ .two-col { grid-template-columns: 1fr; } }

  .tag-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 5px 13px; border-radius: 99px; font-size: 12px; border: 1px solid var(--border); color: var(--text-dim); }
  .tag.s { border-color: rgba(39,174,96,.4); color: var(--green); background: rgba(39,174,96,.05); }
  .tag.g { border-color: rgba(230,180,30,.4); color: #e8b020; background: rgba(230,180,30,.05); }

  .qa-row { margin-bottom: 22px; }
  .qa-q { display: flex; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 7px; line-height: 1.6; }
  .qa-n { color: var(--gold-dim); flex-shrink: 0; }
  .qa-a { font-size: 13px; color: var(--text-dim); padding: 10px 14px; border: 1px solid var(--border); border-radius: 7px; background: rgba(255,255,255,.02); line-height: 1.7; font-style: italic; margin-bottom: 7px; }
  .qa-eval { font-size: 13px; color: #5a9cd8; padding: 7px 12px; border-radius: 6px; background: rgba(58,133,216,.06); border-right: 2px solid rgba(58,133,216,.35); }
  .stars { color: var(--gold); font-size: 13px; margin-left: 5px; }

  .verdict { padding: 22px 28px; border-radius: 12px; border: 1px solid; text-align: center; font-size: 22px; font-weight: 900; }
  .verdict-sub { font-size: 14px; font-weight: 400; margin-top: 10px; line-height: 1.7; opacity: .85; }
  .v-PASS     { border-color: rgba(39,174,96,.5); color: var(--green); background: rgba(39,174,96,.05); }
  .v-HIRE     { border-color: rgba(39,174,96,.5); color: var(--green); background: rgba(39,174,96,.05); }
  .v-CONSIDER { border-color: rgba(230,180,30,.5); color: #e8b020;     background: rgba(230,180,30,.05); }
  .v-REJECT   { border-color: rgba(231,76,60,.5);  color: var(--red);  background: rgba(231,76,60,.05); }

  .rpt-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 40px; }
  .rpt-btn { padding: 11px 26px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .rpt-btn.primary { border-color: var(--gold); color: var(--gold); }
  .rpt-btn.primary:hover { background: var(--gold-glow); }
  .rpt-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .5s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  /* ════════════════════════════════════════
     MOBILE RESPONSIVE
  ════════════════════════════════════════ */
  @media (max-width: 600px) {
    /* Setup */
    .setup-card { width: 100%; max-width: 100%; margin: 0 14px; padding: 36px 26px; border-radius: 18px; }
    .brand h1 { font-size: 26px; }
    .brand-orb { width: 68px; height: 68px; }

    /* Interview room */
    .room-top { padding: 12px 16px; flex-wrap: wrap; gap: 6px; }
    .room-brand { font-size: 14px; }
    .room-counter { font-size: 11px; order: 3; width: 100%; text-align: center; }
    .room-name { font-size: 12px; }
    .room-role { font-size: 10px; }

    .orb-wrap { width: 200px; height: 200px; margin-bottom: 60px; }
    .orb-core { width: 110px; height: 110px; }
    .orb-L { font-size: 42px; }

    .status-wrap { padding: 0 18px; }
    .status-msg { font-size: 17px; min-height: 80px; }
    .question-box { font-size: 15px; padding: 14px 16px; }

    .room-bottom { padding: 14px 14px 20px; gap: 8px; }
    .ctrl { padding: 9px 16px; font-size: 13px; }

    #micCanvas { width: 160px; }

    /* Report */
    #reportScreen { padding: 36px 14px 60px; }
    .rpt-head h1 { font-size: 28px; }
    .rpt-hero-card { flex-direction: column; align-items: flex-start; padding: 22px; gap: 18px; }
    .rpt-cname { font-size: 24px; }
    .grade-ring { width: 66px; height: 66px; align-self: center; }
    .grade-ring .gl { font-size: 26px; }
    .summary-block { font-size: 15px; padding: 16px 18px; }
    .two-col { grid-template-columns: 1fr; gap: 18px; }
    .qa-q { font-size: 13px; }
    .qa-a, .qa-eval { font-size: 12px; }
    .verdict { font-size: 19px; padding: 18px 20px; }
    .verdict-sub { font-size: 13px; }
    .rpt-actions { flex-direction: column; }
    .rpt-btn { width: 100%; }
  }

  @media (max-width: 380px) {
    .orb-wrap { width: 170px; height: 170px; }
    .orb-core { width: 96px; height: 96px; }
    .ctrl { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen" id="setupScreen">
  <div class="setup-card fade-in">
    <div class="brand">
      <div class="brand-orb"><span>L</span></div>
      <h1>لاتينو</h1>

        <option value="معلم رياض أطفال">معلم رياض أطفال</option>
        <option value="معلّم صف 1-3">معلّم صف ١-٣</option>
        <option value="معلّم صف 4-10">معلّم صف ٤-١٠</option>

</div>

<div class="screen hidden" id="roomScreen">

  <!-- Status + question display -->

<!-- ══ THANK YOU (candidate-facing) ══ -->
<div class="screen hidden" id="thankScreen">
  <div class="thank-card fade-in">

    <h1 id="thankTitle">شكراً لك</h1>
    <p id="thankMsg">شكراً لحضورك المقابلة. لقد استلمنا إجاباتك، وسيقوم فريقنا بمراجعتها والتواصل معك في أقرب وقت.</p>
    <div class="thank-status" id="thankStatus">
      <span class="thank-spinner" id="thankSpinner"></span>

    <button class="rpt-btn primary" id="thankNewBtn" style="display:none;margin-top:28px;" onclick="newInterview()">مقابلة جديدة</button>

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const READ_SECONDS = 10;   // thinking/reading time after question is spoken
const MAX_REC_SECONDS = 180; // hard cap on answer recording (3 minutes)
const CIRC = 2 * Math.PI * 26; // 163.4 — SVG circle circumference

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  name: '', exp: '', role: '',
  questions: [], answers: [],
  currentQ: 0, phase: 'idle',
  mediaRecorder: null, audioChunks: [],
  currentAudio: null,
  readTimer: null, readLeft: READ_SECONDS, readOnComplete: null,
  recTimer: null, recLeft: MAX_REC_SECONDS,
  audioCtx: null, analyser: null, vizFrame: null, recMime: '', playCtx: null,
};

const AR = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toAr = n => String(n).split('').map(d => AR[+d]||d).join('');

// Converts role strings into clean spoken Arabic so ElevenLabs pronounces grades correctly.
// e.g. "معلّم صف 1-3" → "مُعَلِّم صُفُوف مِنَ الْأَوَّلِ إِلَى الثَّالِثِ"
function spokenRole(role) {
  const ord = { '1':'الْأَوَّلِ','2':'الثَّانِي','3':'الثَّالِثِ','4':'الرَّابِعِ','10':'الْعَاشِرِ','11':'الْحَادِيَ عَشَرَ','12':'الثَّانِيَ عَشَرَ' };
  const m = role.match(/(\d+)\s*-\s*(\d+)/);
  if (m) {
    const a = ord[m[1]] || m[1];
    const b = ord[m[2]] || m[2];
    return `مُعَلِّمِ صُفُوفٍ مِنَ ${a} إِلَى ${b}`;
  }
  if (role.includes('رياض')) return 'مُعَلِّمِ رِيَاضِ الْأَطْفَالِ';
  return role;
}

// ═══════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════
async function beginInterview() {
  const name = document.getElementById('sName').value.trim();
  const exp  = document.getElementById('sExp').value.trim();
  const role = document.getElementById('sRole').value;
  const err  = document.getElementById('setupErr');
  if (!name || !exp || !role) { err.textContent = 'يرجى تعبئة جميع الحقول.'; return; }
  err.textContent = '';
  document.getElementById('btnBegin').disabled = true;

  const res = await fetch(`/api/questions/${encodeURIComponent(role)}`);
  S.questions = await res.json();
  S.name = name; S.exp = exp; S.role = role;
  S.answers = Array(S.questions.length).fill('');
  S.currentQ = 0;

  document.getElementById('roomName').textContent = name;
  document.getElementById('roomRole').textContent = toAr(role) + ' · ' + exp;
  buildProgressDots();
  showScreen('roomScreen');
  setTimeout(doIntro, 700);
}

function showScreen(id) {
  ['setupScreen','roomScreen','thankScreen'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id));
}

// ═══════════════════════════════════════════════
//  PROGRESS DOTS
// ═══════════════════════════════════════════════
function buildProgressDots() {
  document.getElementById('progressDots').innerHTML =
    S.questions.map((_,i) => `<div class="pdot" id="pd${i}"></div>`).join('');
  refreshDots();
}
function refreshDots() {
  S.questions.forEach((_,i) => {
    const d = document.getElementById('pd'+i);
    if (d) d.className = 'pdot'+(i<S.currentQ?' done':i===S.currentQ?' active':'');
  });
}

// ═══════════════════════════════════════════════
//  ELEVENLABS TTS — speaks text, returns promise
// ═══════════════════════════════════════════════
async function speak(text) {
  return new Promise(async (resolve) => {
    setPhase('speaking');
    try {
      const res = await fetch('/api/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) { resolve(); return; }

      // Use Web Audio API instead of HTMLAudioElement — more reliable MP3 decoder.
      const buf = await res.arrayBuffer();
      if (!S.playCtx) S.playCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = S.playCtx;
      // Resume context if browser suspended it
      if (ctx.state === 'suspended') { try { await ctx.resume(); } catch {} }

      let decoded;
      try {
        decoded = await ctx.decodeAudioData(buf.slice(0));
      } catch(e) {
        console.error('Audio decode failed:', e);
        resolve(); return;
      }

      const src = ctx.createBufferSource();
      src.buffer = decoded;
      src.connect(ctx.destination);
      S.currentAudio = src;
      src.onended = () => { S.currentAudio = null; resolve(); };
      src.start();
    } catch(e) { console.error('TTS:', e); resolve(); }
  });
}

// ═══════════════════════════════════════════════
//  60-SECOND READING COUNTDOWN
//  Shown AFTER ElevenLabs finishes speaking the question.
//  Candidate can start answering at any time or wait.
//  When countdown hits 0 → recording auto-starts.
// ═══════════════════════════════════════════════
function startReadCountdown(onComplete) {
  S.readLeft = READ_SECONDS;
  S.readOnComplete = onComplete;
  const bar = document.getElementById('cdBar');
  const num = document.getElementById('cdNum');
  const wrap = document.getElementById('countdownWrap');

  bar.style.strokeDasharray  = CIRC;
  bar.style.strokeDashoffset = 0;
  num.textContent = READ_SECONDS;
  wrap.classList.add('on');

  setPhase('reading');
  setStatus('purple', 'وقت التفكير', 'لديك ١٠ ثوانٍ للتفكير، أو اضغط "ابدأ الإجابة الآن".');

  // Show the "answer now" button; allow skip too. Hide "done" until recording starts.
  document.getElementById('btnAnswerNow').style.display = '';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = false;

  S.readTimer = setInterval(() => {
    S.readLeft--;
    const offset = CIRC * (1 - S.readLeft / READ_SECONDS);
    bar.style.strokeDashoffset = offset;
    num.textContent = S.readLeft;

    if (S.readLeft <= 0) {
      stopReadCountdown();
      // Use S.readOnComplete (not the closure) so answerNow() can null it out and prevent double-fire.
      const cb = S.readOnComplete;
      S.readOnComplete = null;
      if (cb) cb();
    }
  }, 1000);
}

// Candidate chose to start answering immediately — skip remaining think time
function answerNow() {
  if (S.phase !== 'reading') return;
  stopReadCountdown();
  const cb = S.readOnComplete;
  S.readOnComplete = null;
  if (cb) cb(); // starts recording
}

function stopReadCountdown() {
  if (S.readTimer) { clearInterval(S.readTimer); S.readTimer = null; }
  document.getElementById('countdownWrap').classList.remove('on');
}

// ═══════════════════════════════════════════════
//  DEEPGRAM STT — unlimited recording
// ═══════════════════════════════════════════════
async function startRecording() {
  // Guard: if recording is already active, don't start a second one (causes "Device in use")
  if (S.mediaRecorder && S.mediaRecorder.state === 'recording') {
    console.warn('startRecording called while already recording — ignoring duplicate call');
    return;
  }

  // Clean up any orphaned tracks before requesting the mic again
  if (S.mediaRecorder && S.mediaRecorder.stream) {
    try { S.mediaRecorder.stream.getTracks().forEach(t => t.stop()); } catch {}
    S.mediaRecorder = null;
  }

  setPhase('listening');
  setStatus('green', 'يرجى الإجابة الآن', 'التسجيل جارٍ… اضغط "انتهيت من الإجابة" عند الانتهاء.');
  S.audioChunks = [];

  // Switch buttons: hide "answer now", enable "done"
  document.getElementById('btnAnswerNow').style.display = 'none';
  document.getElementById('btnNext').disabled = false;
  document.getElementById('btnSkip').disabled = false;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // Pick a mimeType the device actually supports (mobile Safari/Chrome vary)
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',
      'audio/aac',
      'audio/ogg;codecs=opus',
      'audio/ogg',
    ];
    let mime = '';
    if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
      mime = candidates.find(c => MediaRecorder.isTypeSupported(c)) || '';
    }
    S.recMime = mime || 'audio/webm';
    S.mediaRecorder = mime
      ? new MediaRecorder(stream, { mimeType: mime })
      : new MediaRecorder(stream);

    S.mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) S.audioChunks.push(e.data); };
    S.mediaRecorder.start(250);
    startVisualizer(stream); // live waveform reacts to candidate's voice
    startRecCountdown();     // 3-minute hard cap
  } catch(e) {
    setStatus('gold', 'خطأ في الميكروفون', 'تعذّر الوصول إلى الميكروفون: ' + e.message);
  }
}

// ═══════════════════════════════════════════════
//  MAX RECORDING COUNTDOWN (3 min cap → auto-submit)
// ═══════════════════════════════════════════════
function startRecCountdown() {
  stopRecCountdown();
  S.recLeft = MAX_REC_SECONDS;
  updateRecLabel();
  S.recTimer = setInterval(() => {
    S.recLeft--;
    updateRecLabel();
    if (S.recLeft <= 0) {
      stopRecCountdown();
      // Time's up — auto-submit the answer
      if (S.phase === 'listening') doneAnswering();
    }
  }, 1000);
}

function updateRecLabel() {
  const m = Math.floor(S.recLeft / 60);
  const s = S.recLeft % 60;
  const t = `${toAr(m)}:${toAr(String(s).padStart(2,'0'))}`;
  const urgent = S.recLeft <= 20;
  setStatus('green', urgent ? 'تبقّى وقت قليل' : 'يرجى الإجابة الآن',
    `التسجيل جارٍ — الوقت المتبقي ${t} — اضغط "انتهيت من الإجابة" عند الانتهاء.`);
}

function stopRecCountdown() {
  if (S.recTimer) { clearInterval(S.recTimer); S.recTimer = null; }
}

// ═══════════════════════════════════════════════
//  LIVE MIC VISUALIZER (Web Audio API)
// ═══════════════════════════════════════════════
function startVisualizer(stream) {
  try {
    S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source   = S.audioCtx.createMediaStreamSource(stream);
    S.analyser     = S.audioCtx.createAnalyser();
    S.analyser.fftSize = 256;
    S.analyser.smoothingTimeConstant = 0.7;
    source.connect(S.analyser);

    const canvas = document.getElementById('micCanvas');
    const ctx    = canvas.getContext('2d');
    const bufLen = S.analyser.frequencyBinCount;
    const data   = new Uint8Array(bufLen);
    const BARS   = 32;

    const draw = () => {
      S.vizFrame = requestAnimationFrame(draw);
      S.analyser.getByteFrequencyData(data);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const barW = canvas.width / BARS;
      const step = Math.floor(bufLen / BARS);
      for (let i = 0; i < BARS; i++) {
        const v = data[i * step] / 255;            // 0..1
        const h = Math.max(2, v * canvas.height);
        const x = i * barW;
        const y = (canvas.height - h) / 2;
        // green gradient that brightens with volume
        const g = Math.round(120 + v * 135);
        ctx.fillStyle = `rgb(39, ${g}, 96)`;
        if (ctx.roundRect) {
          ctx.beginPath();
          ctx.roundRect(x + barW * 0.2, y, barW * 0.6, h, 2);
          ctx.fill();
        } else {
          ctx.fillRect(x + barW * 0.2, y, barW * 0.6, h);
        }
      }
    };
    draw();
  } catch(e) { console.error('Visualizer:', e); }
}

function stopVisualizer() {
  if (S.vizFrame) { cancelAnimationFrame(S.vizFrame); S.vizFrame = null; }
  if (S.audioCtx) { try { S.audioCtx.close(); } catch {} S.audioCtx = null; }
  const canvas = document.getElementById('micCanvas');
  if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
}

async function stopRecordingAndTranscribe() {
  return new Promise((resolve) => {
    if (!S.mediaRecorder || S.mediaRecorder.state === 'inactive') { resolve(''); return; }

    S.mediaRecorder.onstop = async () => {
      stopVisualizer();
      stopRecCountdown();
      S.mediaRecorder.stream.getTracks().forEach(t => t.stop());
      const mime = S.recMime || 'audio/webm';
      const blob = new Blob(S.audioChunks, { type: mime });
      console.log('Recorded blob:', blob.size, 'bytes, mime:', mime, 'chunks:', S.audioChunks.length);
      if (blob.size < 1000) {
        setStatus('gold', 'لم يُلتقط صوت', `حجم التسجيل صغير جداً (${blob.size} بايت). تأكد من إذن الميكروفون وتحدّث بصوت أوضح.`);
        resolve('');
        return;
      }

      const ext  = mime.includes('mp4') ? 'mp4' : mime.includes('ogg') ? 'ogg' : mime.includes('aac') ? 'aac' : 'webm';
      const form = new FormData();
      form.append('audio', blob, 'answer.' + ext);
      form.append('mime', mime);

      setPhase('thinking');
      setStatus('blue', 'جارٍ تحويل الصوت', 'معالجة إجابتك…');

      try {
        const res  = await fetch('/api/transcribe', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || data.error) {
          // Surface the real reason so we can diagnose
          S.lastError = data;
          console.error('Transcribe failed:', data);
          const reason = data.detail ? `${data.error} — ${data.detail}` : (data.error || 'خطأ غير معروف');
          setStatus('gold', 'تعذّر تحويل الصوت', reason);
          resolve('');
          return;
        }
        resolve(data.transcript || '');
      } catch(e) { console.error('STT:', e); setStatus('gold','خطأ في الشبكة', e.message); resolve(''); }
    };

    S.mediaRecorder.stop();
  });
}

// ═══════════════════════════════════════════════
//  INTERVIEW FLOW
//
//  Per question:
//  1. ElevenLabs speaks the question (orb = speaking, wave on)
//  2. 60s countdown (orb = reading/purple, countdown visible)
//     → candidate can press "done" at any time to skip to recording
//     → or wait; when countdown hits 0 recording auto-starts
//  3. Unlimited recording (orb = listening, mic on)
//     → candidate presses "انتهيت" when finished
//  4. Deepgram transcribes → next question
// ═══════════════════════════════════════════════
async function doIntro() {
  const countWords = { 3:'ثَلَاثَةَ', 4:'أَرْبَعَةَ', 5:'خَمْسَةَ', 6:'سِتَّةَ', 7:'سَبْعَةَ', 8:'ثَمَانِيَةَ' };
  const cw = countWords[S.questions.length] || toAr(S.questions.length);
  const txt = `${timeOfDay()}، ${S.name}. أَنَا لَاتِينُو. هَذِهِ مُقَابَلَةٌ مَبْدَئِيَّةٌ قَصِيرَةٌ لِوَظِيفَةِ ${spokenRole(S.role)}. سَأَطْرَحُ ${cw} أَسْئِلَةٍ، وَبَعْدَ كُلِّ سُؤَالٍ أَجِبْ بِحُرِّيَّةٍ ثُمَّ اضْغَطْ زِرَّ انْتَهَيْتُ. لِنَبْدَأْ.`;
  setStatus('gold', 'الترحيب', txt);
  await speak(txt);
  await runQuestion();
}

async function runQuestion() {
  const q = S.questions[S.currentQ];
  updateCounter();
  refreshDots();
  hideQuestionBox();
  document.getElementById('liveTranscript').textContent = '';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = true;

  // ── PHASE 1: ElevenLabs reads the question aloud ──
  const ordinals = ['الْأَوَّلُ','الثَّانِي','الثَّالِثُ','الرَّابِعُ','الْخَامِسُ','السَّادِسُ','السَّابِعُ','الثَّامِنُ'];
  const label = `السُّؤَالُ ${ordinals[S.currentQ] || toAr(S.currentQ+1)}`;
  const fullText = `${label}. ${q.q}`;

  setStatus('gold', `يُقرأ ${label}`, q.display || q.q);
  showQuestionBox(q.display || q.q);

  await speak(fullText); // blocks until ElevenLabs audio finishes (uses tashkeel)

  // ── PHASE 2: 60s reading/thinking countdown ──
  // When countdown ends → auto-start recording
  startReadCountdown(() => {
    startRecording();
  });
}

async function doneAnswering() {
  stopReadCountdown();
  document.getElementById('btnAnswerNow').style.display = 'none';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = true;
  hideQuestionBox();

  // Stop recording and transcribe
  const transcript = await stopRecordingAndTranscribe();

  // If nothing was captured, let the candidate retry instead of silently failing
  if (!transcript || transcript.trim().length < 2) {
    setStatus('purple', 'لم نسمع إجابة', 'لم يُلتقط أي صوت. سيبدأ التسجيل من جديد — تحدّث الآن.');
    document.getElementById('liveTranscript').textContent = '';
    await new Promise(r => setTimeout(r, 1500));
    await startRecording();
    return; // candidate answers again; pressing "انتهيت" re-enters this function
  }

  S.answers[S.currentQ] = transcript;
  document.getElementById('liveTranscript').textContent = `"${transcript}"`;

  if (S.currentQ >= S.questions.length - 1) {
    await doOutro();
    return;
  }

  // Bridge to next question
  const bridges = ['شُكْراً لَكَ.', 'حَسَناً، شُكْراً.', 'أُقَدِّرُ ذَلِكَ.', 'شُكْراً عَلَى مُشَارَكَتِكَ.', 'مَفْهُومٌ، شُكْراً.'];
  const bridge  = bridges[Math.floor(Math.random() * bridges.length)];
  setStatus('gold', 'الانتقال', bridge);
  await speak(bridge);

  S.currentQ++;
  await runQuestion();
}

async function skipQuestion() {
  stopReadCountdown();
  document.getElementById('btnAnswerNow').style.display = 'none';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = true;
  hideQuestionBox();

  // Stop any active recording
  if (S.mediaRecorder && S.mediaRecorder.state !== 'inactive') {
    stopVisualizer();
    S.mediaRecorder.stream.getTracks().forEach(t => t.stop());
    try { S.mediaRecorder.stop(); } catch {}
  }
  S.answers[S.currentQ] = '[تم تخطي السؤال]';

  if (S.currentQ >= S.questions.length - 1) { await doOutro(); return; }
  S.currentQ++;
  await runQuestion();
}

async function doOutro() {
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = true;
  refreshDots();

  const outro = `شُكْراً جَزِيلاً، ${S.name}. هَذَا يَخْتَتِمُ مُقَابَلَتَنَا. لَقَدْ أَجَبْتَ عَلَى جَمِيعِ الْأَسْئِلَةِ. سَنُرَاجِعُ إِجَابَاتِكَ وَنَتَوَاصَلُ مَعَكَ فِي أَقْرَبِ وَقْتٍ. نَتَمَنَّى لَكَ يَوْماً مُوَفَّقاً.`;
  setStatus('gold', 'الختام', outro);
  await speak(outro);

  setStatus('blue', 'جارٍ التقييم', 'يحلّل لاتينو إجاباتك ويُعدّ التقرير…');
  setPhase('thinking');
  await runEvaluation();
}

async function endEarly() {
  stopReadCountdown();
  stopRecCountdown();
  stopVisualizer();
  if (S.currentAudio) { try { S.currentAudio.stop(); } catch{} S.currentAudio = null; }
  if (S.mediaRecorder && S.mediaRecorder.state !== 'inactive') {
    S.mediaRecorder.stream.getTracks().forEach(t => t.stop());
    try { S.mediaRecorder.stop(); } catch {}
  }
  for (let i = S.currentQ; i < S.questions.length; i++) {
    if (!S.answers[i]) S.answers[i] = '[لم يُطرح]';
  }
  document.getElementById('btnAnswerNow').style.display = 'none';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('btnSkip').disabled = true;
  hideQuestionBox();
  setStatus('blue', 'جارٍ التقييم', 'جارٍ إعداد تقرير التقييم…');
  setPhase('thinking');
  await runEvaluation();
}

// ═══════════════════════════════════════════════
//  EVALUATE WITH CLAUDE
// ═══════════════════════════════════════════════
async function runEvaluation() {
  // Candidate immediately sees only the thank-you screen.
  showScreen('thankScreen');
  const statusBox  = document.getElementById('thankStatus');
  const statusText = document.getElementById('thankStatusText');
  statusBox.classList.remove('done');
  statusText.textContent = 'جارٍ حفظ إجاباتك…';

  // In the background: generate the evaluation and email it to HR.
  try {
    const res = await fetch('/api/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: S.name, exp: S.exp, role: S.role, questions: S.questions, answers: S.answers }),
    });
    const data = await res.json();

    if (res.ok && !data.error) {
      statusBox.classList.add('done');
      statusText.textContent = 'تم استلام إجاباتك بنجاح ✓';
    } else {
      // Even if email/eval failed, candidate still sees a graceful message.
      statusBox.classList.add('done');
      statusText.textContent = 'تم استلام إجاباتك ✓';
      console.error('Evaluation/email issue:', data);
    }
  } catch(e) {
    statusBox.classList.add('done');
    statusText.textContent = 'تم استلام إجاباتك ✓';
    console.error('Eval error:', e);
  }

  // Allow starting a new interview after a short pause
  setTimeout(() => {
    document.getElementById('thankNewBtn').style.display = '';
  }, 2500);
}

// ═══════════════════════════════════════════════
//  RENDER REPORT
// ═══════════════════════════════════════════════
function newInterview() {
  S.name=''; S.exp=''; S.role=''; S.questions=[]; S.answers=[];
  S.currentQ=0; S.phase='idle';
  ['sName','sExp'].forEach(id => document.getElementById(id).value='');
  document.getElementById('sRole').value='';
  document.getElementById('btnBegin').disabled=false;
  document.getElementById('setupErr').textContent='';
  document.getElementById('thankNewBtn').style.display='none';
  showScreen('setupScreen');
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function setPhase(phase) {
  S.phase = phase;
  const orb = document.getElementById('orbCore');
  orb.className = 'orb-core' + (phase !== 'idle' ? ' ' + phase : '');
  document.getElementById('soundwave').classList.toggle('on', phase === 'speaking');
  document.getElementById('micIndicator').classList.toggle('on', phase === 'listening');
}

function setStatus(pip, tag, msg) {
  document.getElementById('statusPip').className = 'status-pip ' + pip;
  document.getElementById('statusTag').textContent = tag;
  document.getElementById('statusMsg').textContent  = msg;
}

function showQuestionBox(text) {
  const box = document.getElementById('questionBox');
  box.textContent = text;
  box.classList.add('on');
}
function hideQuestionBox() {
  document.getElementById('questionBox').classList.remove('on');
}

function updateCounter() {
  document.getElementById('roomCounter').textContent =
    `السؤال ${toAr(S.currentQ+1)} من ${toAr(S.questions.length)}`;
}

function timeOfDay() {
  return new Date().getHours() < 12 ? 'صباح الخير' : 'مساء الخير';
}
</script>
